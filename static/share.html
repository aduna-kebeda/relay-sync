<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Share Location</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="share-page">
  <main class="card">
    <h1>Share your location</h1>
    <p class="subtitle">Your live GPS is sent to the room organizer only while this page is open.</p>

    <div id="join-form">
      <label for="name">Your name</label>
      <input id="name" type="text" placeholder="e.g. Alex" maxlength="64" autocomplete="name">
      <button id="start-btn" class="btn primary full">Start sharing</button>
    </div>

    <div id="sharing" class="hidden">
      <div class="status sharing-active">
        <span class="dot"></span>
        <span id="status-text">Sharing live location…</span>
      </div>
      <p id="coords" class="coords"></p>
      <p id="person-name" class="person-name"></p>
      <button id="stop-btn" class="btn secondary full">Stop sharing</button>
    </div>

    <div id="error" class="error hidden"></div>
  </main>
  <script src="/static/share.js"></script>
</body>
</html>
