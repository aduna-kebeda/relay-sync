<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relay</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="card">
    <h1>Relay</h1>
    <p class="subtitle">Coordinate with your group. Everyone stays on the same page.</p>

    <button id="create-room" class="btn primary">New session</button>

    <div id="result" class="result hidden">
      <h2>Session ready</h2>
      <p><strong>Invite link</strong> — send to your group:</p>
      <div class="copy-row">
        <input id="share-url" readonly>
        <button class="btn small" data-copy="share-url">Copy</button>
      </div>

      <p><strong>Your view</strong> — open to see the group:</p>
      <div class="copy-row">
        <input id="admin-url" readonly>
        <button class="btn small" data-copy="admin-url">Copy</button>
      </div>

      <a id="open-admin" class="btn secondary" href="#">Open view</a>
    </div>

    <p class="note">Members open the invite link on their phone to join the session.</p>
  </main>
  <script>
    const createBtn = document.getElementById('create-room');
    const result = document.getElementById('result');

    createBtn.addEventListener('click', async () => {
      createBtn.disabled = true;
      createBtn.textContent = 'Creating…';
      try {
        const res = await fetch('/api/rooms', { method: 'POST' });
        const data = await res.json();
        document.getElementById('share-url').value = data.share_url;
        document.getElementById('admin-url').value = data.admin_url;
        document.getElementById('open-admin').href = data.admin_url;
        result.classList.remove('hidden');
      } finally {
        createBtn.disabled = false;
        createBtn.textContent = 'New session';
      }
    });

    document.querySelectorAll('[data-copy]').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.copy);
        input.select();
        navigator.clipboard.writeText(input.value);
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
      });
    });
  </script>
</body>
</html>
