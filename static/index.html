<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relay</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="card">
    <h1>Relay</h1>
    <p class="subtitle">Coordinate with your group. Everyone stays on the same page.</p>

    <button id="create-room" class="btn primary">New session</button>

    <div id="result" class="result hidden">
      <h2>Session ready</h2>
      <p><strong>Invite link</strong> — send to your group:</p>
      <div class="copy-row">
        <input id="share-url" readonly>
        <button class="btn small" data-copy="share-url">Copy</button>
      </div>

      <p><strong>Your view</strong> — open to see the group:</p>
      <div class="copy-row">
        <input id="admin-url" readonly>
        <button class="btn small" data-copy="admin-url">Copy</button>
      </div>

      <a id="open-admin" class="btn secondary" href="#">Open view</a>
    </div>

    <p class="note">Members open the invite link on their phone to join the session.</p>

    <div id="sessions-list" class="sessions-list hidden"></div>
  </main>
  <script src="/static/index.js"></script>
</body>
</html>
